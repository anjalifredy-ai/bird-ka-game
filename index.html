<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bird Game - Web Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 700px;
            max-width: 100vw;
            max-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            color: #fff;
            font-size: 48px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #FF512F 0%, #F09819 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(240, 152, 25, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 10px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(240, 152, 25, 0.4);
        }

        .stats-box {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 10px;
            font-size: 18px;
            color: #333;
            text-align: center;
        }

        .mode-cards {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
        }

        .mode-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .mode-card:active { transform: scale(0.95); }
        .mode-card h2 { margin: 0; font-size: 22px; }
        .mode-card p { margin: 5px 0 0; font-size: 14px; color: #666; }
        
        #easy-card h2 { color: #4CAF50; }
        #normal-card h2 { color: #FFC107; }
        #hard-card h2 { color: #F44336; }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 5;
        }
        
        #celebration {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: #FFD700;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 6;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .floating-bird {
            font-size: 60px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="700"></canvas>
    
    <!-- HUD -->
    <div id="hud" class="hidden">
        <div id="scoreDisplay">0</div>
        <div id="coinDisplay">🪙 0</div>
    </div>
    
    <div id="celebration">+10 Points! 🎉</div>

    <!-- Main Menu -->
    <div id="main-menu" class="screen">
        <div class="floating-bird">🐦</div>
        <h1>Bird Game</h1>
        <button class="btn" id="playBtn">PLAY</button>
        <div class="stats-box">
            Best Score: <span id="menuBestScore">0</span><br>
            Total Coins: <span id="menuTotalCoins">0</span>
        </div>
        <button class="btn" id="soundBtn" style="font-size: 16px; padding: 10px 20px; background: #333;">🔊 Sound ON</button>
    </div>

    <!-- Mode Select -->
    <div id="mode-select" class="screen hidden">
        <h1 style="font-size: 32px;">Select Mode</h1>
        <div class="mode-cards">
            <div class="mode-card" id="easy-card">
                <h2>🟢 Easy</h2>
                <p>Large Gap • Slow Pipes</p>
            </div>
            <div class="mode-card" id="normal-card">
                <h2>🟡 Normal</h2>
                <p>Medium Gap • Balanced</p>
            </div>
            <div class="mode-card" id="hard-card">
                <h2>🔴 Hard</h2>
                <p>Small Gap • Fast Pipes</p>
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over" class="screen hidden">
        <h1>Game Over</h1>
        <div class="stats-box">
            Score: <span id="endScore">0</span><br>
            Best: <span id="endBestScore">0</span><br>
            Coins Collected: <span id="endCoins">0</span>
        </div>
        <button class="btn" id="restartBtn">Restart</button>
        <button class="btn" id="homeBtn" style="background: linear-gradient(135deg, #36D1DC 0%, #5B86E5 100%);">Home</button>
    </div>
</div>

<script>
    // System Config
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let frames = 0;
    
    // Audio Context (Simple Synth for sounds to keep it web-native)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let soundEnabled = true;

    function playSound(type) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'flap') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'coin') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'score') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'crash') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // State Management
    const state = {
        current: 0,
        MENU: 0,
        MODE_SELECT: 1,
        GAME: 2,
        GAMEOVER: 3
    };

    let bestScore = localStorage.getItem('birdBestScore') || 0;
    let totalCoins = localStorage.getItem('birdTotalCoins') || 0;

    // Game Variables
    let difficulty = { gap: 220, speed: 4 };
    let score = 0;
    let sessionCoins = 0;
    let groundX = 0;

    // Objects
    const bird = {
        x: 80, y: 350, vy: 0, radius: 20,
        gravity: 0.35, jump: -7,
        draw() {
            ctx.font = '40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Rotation based on velocity
            ctx.save();
            ctx.translate(this.x, this.y);
            let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.vy * 0.1)));
            ctx.rotate(rotation);
            ctx.fillText('🐦', 0, 0);
            ctx.restore();
        },
        update() {
            this.vy += this.gravity;
            this.y += this.vy;
            if (this.y + this.radius >= canvas.height - 100) {
                this.y = canvas.height - 100 - this.radius;
                gameOver();
            }
            if (this.y - this.radius <= 0) {
                this.y = this.radius;
                this.vy = 0;
            }
        },
        flap() {
            this.vy = this.jump;
            playSound('flap');
        },
        reset() {
            this.y = 350;
            this.vy = 0;
        }
    };

    const pipes = {
        list: [],
        draw() {
            for (let i = 0; i < this.list.length; i++) {
                let p = this.list[i];
                // Draw Pipe (Green Gradient)
                let grad = ctx.createLinearGradient(p.x, 0, p.x + p.w, 0);
                grad.addColorStop(0, '#53a828');
                grad.addColorStop(0.5, '#73d93b');
                grad.addColorStop(1, '#53a828');
                ctx.fillStyle = grad;
                
                // Top Pipe
                ctx.fillRect(p.x, 0, p.w, p.top);
                ctx.strokeRect(p.x, 0, p.w, p.top);
                ctx.fillRect(p.x - 5, p.top - 20, p.w + 10, 20); // Cap
                
                // Bottom Pipe
                ctx.fillRect(p.x, canvas.height - 100 - p.bottom, p.w, p.bottom);
                ctx.strokeRect(p.x, canvas.height - 100 - p.bottom, p.w, p.bottom);
                ctx.fillRect(p.x - 5, canvas.height - 100 - p.bottom, p.w + 10, 20); // Cap
                
                // Draw Coin
                if (!p.coinCollected) {
                    ctx.font = '30px sans-serif';
                    ctx.fillText('🪙', p.x + p.w/2, p.top + difficulty.gap/2);
                }
            }
        },
        update() {
            if (frames % 100 === 0) {
                let pHeight = canvas.height - 100 - difficulty.gap;
                let topPipe = Math.max(50, Math.random() * (pHeight - 100) + 50);
                this.list.push({
                    x: canvas.width,
                    w: 60,
                    top: topPipe,
                    bottom: pHeight - topPipe,
                    passed: false,
                    coinCollected: Math.random() > 0.5 // 50% chance to have a coin
                });
            }
            
            for (let i = 0; i < this.list.length; i++) {
                let p = this.list[i];
                p.x -= difficulty.speed;

                // Collision Logic
                // AABB Hitbox for bird (making it slightly smaller than emoji for fairness)
                let bx = bird.x - 10, by = bird.y - 10, bw = 20, bh = 20;
                
                // Top Pipe
                if (bx + bw > p.x && bx < p.x + p.w && by < p.top) gameOver();
                // Bottom Pipe
                if (bx + bw > p.x && bx < p.x + p.w && by + bh > canvas.height - 100 - p.bottom) gameOver();

                // Coin Collision
                if (!p.coinCollected) {
                    let cx = p.x + p.w/2;
                    let cy = p.top + difficulty.gap/2;
                    let dist = Math.hypot(bird.x - cx, bird.y - cy);
                    if (dist < 40) {
                        p.coinCollected = true;
                        sessionCoins++;
                        totalCoins++;
                        playSound('coin');
                        document.getElementById('coinDisplay').innerText = `🪙 ${sessionCoins}`;
                    }
                }

                // Score Logic
                if (p.x + p.w < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                    playSound('score');
                    document.getElementById('scoreDisplay').innerText = score;
                    
                    // Difficulty Scaling every 20 points
                    if (score % 20 === 0) {
                        difficulty.speed += 0.5;
                    }
                    // Reward every 10 points
                    if (score % 10 === 0) {
                        triggerCelebration();
                        sessionCoins += 5; // Bonus coins
                        totalCoins += 5;
                        playSound('coin');
                        document.getElementById('coinDisplay').innerText = `🪙 ${sessionCoins}`;
                    }
                }

                // Remove off-screen pipes
                if (p.x + p.w < 0) {
                    this.list.shift();
                    i--;
                }
            }
        },
        reset() {
            this.list = [];
        }
    };

    function drawBackground() {
        // Clouds
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        let cloudX = (frames * 0.5) % (canvas.width + 100);
        ctx.beginPath();
        ctx.arc(canvas.width - cloudX, 150, 30, 0, Math.PI * 2);
        ctx.arc(canvas.width - cloudX + 40, 150, 40, 0, Math.PI * 2);
        ctx.arc(canvas.width - cloudX + 80, 150, 30, 0, Math.PI * 2);
        ctx.fill();

        // Mountains
        ctx.fillStyle = "#8FBC8F";
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 100);
        ctx.lineTo(100, canvas.height - 300);
        ctx.lineTo(250, canvas.height - 100);
        ctx.fill();
        ctx.fillStyle = "#7CB342";
        ctx.beginPath();
        ctx.moveTo(150, canvas.height - 100);
        ctx.lineTo(300, canvas.height - 250);
        ctx.lineTo(400, canvas.height - 100);
        ctx.fill();

        // Ground
        groundX = (groundX - difficulty.speed) % 40;
        ctx.fillStyle = '#D2B48C';
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(0, canvas.height - 100, canvas.width, 10);
        
        // Grass pattern
        ctx.fillStyle = '#556B2F';
        for(let i=0; i<15; i++) {
            ctx.beginPath();
            ctx.moveTo(groundX + (i*40), canvas.height - 100);
            ctx.lineTo(groundX + (i*40) + 20, canvas.height - 120);
            ctx.lineTo(groundX + (i*40) + 40, canvas.height - 100);
            ctx.fill();
        }
    }

    function triggerCelebration() {
        const cel = document.getElementById('celebration');
        cel.style.opacity = 1;
        setTimeout(() => cel.style.opacity = 0, 1500);
    }

    // Main Game Loop
    function loop() {
        if (state.current !== state.GAME) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackground();
        pipes.update();
        pipes.draw();
        bird.update();
        bird.draw();
        
        frames++;
        requestAnimationFrame(loop);
    }

    // Input Handling
    function handleInput() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (state.current === state.GAME) {
            bird.flap();
        }
    }
    
    // Both Mouse and Touch for Mobile feel
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive: false});

    // UI Logic
    function updateMenuStats() {
        document.getElementById('menuBestScore').innerText = bestScore;
        document.getElementById('menuTotalCoins').innerText = totalCoins;
    }

    function gameOver() {
        state.current = state.GAMEOVER;
        playSound('crash');
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('birdBestScore', bestScore);
        }
        localStorage.setItem('birdTotalCoins', totalCoins);
        
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');
        
        document.getElementById('endScore').innerText = score;
        document.getElementById('endBestScore').innerText = bestScore;
        document.getElementById('endCoins').innerText = sessionCoins;
    }

    function startGame(mode) {
        if (mode === 'easy') { difficulty.gap = 260; difficulty.speed = 3; }
        else if (mode === 'normal') { difficulty.gap = 220; difficulty.speed = 5; }
        else if (mode === 'hard') { difficulty.gap = 180; difficulty.speed = 7; }

        bird.reset();
        pipes.reset();
        score = 0;
        sessionCoins = 0;
        frames = 0;
        
        document.getElementById('scoreDisplay').innerText = score;
        document.getElementById('coinDisplay').innerText = `🪙 ${sessionCoins}`;
        
        document.getElementById('mode-select').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        state.current = state.GAME;
        loop();
    }

    // Buttons
    document.getElementById('playBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!audioCtx) audioCtx = new AudioContext();
        playSound('score');
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('mode-select').classList.remove('hidden');
    });

    document.getElementById('soundBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        soundEnabled = !soundEnabled;
        document.getElementById('soundBtn').innerText = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
    });

    document.getElementById('easy-card').addEventListener('click', (e) => { e.stopPropagation(); startGame('easy'); });
    document.getElementById('normal-card').addEventListener('click', (e) => { e.stopPropagation(); startGame('normal'); });
    document.getElementById('hard-card').addEventListener('click', (e) => { e.stopPropagation(); startGame('hard'); });

    document.getElementById('restartBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('game-over').classList.add('hidden');
        // Restart in same difficulty
        let mode = difficulty.gap === 260 ? 'easy' : (difficulty.gap === 180 ? 'hard' : 'normal');
        startGame(mode);
    });

    document.get
